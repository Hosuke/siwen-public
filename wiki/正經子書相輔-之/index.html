    <meta property="og:description" content="抱朴子又云：「仰而比之，則景星之佐三辰；俯而方之，則林薄之裨嵩嶽。」言正經與子書相須為用，不可偏廢。子書披引玄曠，總不測之源，揚無遺之流，變化不系於規矩之方圓，旁通不淪於違正之邪徑。是以才士所寄於其間者，正以其能增深正道，非異端也。 所出：《抱朴子 · 卷44》 — https://zh.wikis…" />
