    <meta property="og:description" content="《墨子·貴義》篇載墨子以商賈與士人相較：「商人之四方，市賈倍徙，雖有關梁之難、盜賊之危，必爲之。今士坐而言義，無關梁之難、盜賊之危，此爲倍徙不可勝計，然而不爲。則士之計利，不若商人之察也。」 此論甚烈：商賈冒關梁之難、盜賊之危以趨倍徙之利，而士人坐而言義，無險可畏，猶不爲之。是士人計較利害，反不如商…" />
