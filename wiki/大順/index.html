    <meta property="og:description" content="大順為《禮記·禮運》篇所論治道之極致，亦儒家政治哲學之歸宿。 《禮運》云：「故人情者，聖王之田也。脩禮以耕之，陳義以種之，講學以耨之，本仁以聚之，播樂以安之。」 此以治國比之農事：治國不以禮，猶無耜而耕也；為禮不本於義，猶耕而弗種也；為義而不講之以學，猶種而弗耨也；講之於學而不合之以仁，猶耨而弗獲也…" />
