    <meta property="og:description" content="又《南山》四章皆以取妻為言，其二章言「魯道有蕩，齊子由歸」，責襄公淫其妹而歸之；其三章言「取妻如之何？必告父母」；其四章言「取妻如之何？匪媒不得」。皆明昏姻之禮不可以私廢，亦不可以非禮犯之。是詩之作，正以諷大夫遇襄公鳥獸之行而作詩以去之，見昏禮之亂乃風教之大者。 所出：《詩經 · 南山》 — htt…" />
