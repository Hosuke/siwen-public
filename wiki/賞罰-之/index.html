    <meta property="og:description" content="《商君書 · 卷五》禁使篇云：人主之所以禁使者，賞罰也。賞隨功，罰隨罪，故論功察罪，不可不審也。又君臣篇云：明君之治天下也，緣法而治，按功而賞。凡民之所疾戰不避死者，以求爵祿也。士有斬首捕虜之功，必其爵足榮也，祿足食也。又慎法篇云：使吏非法無以守，則雖巧不得為姦；使民非戰無以效其能，則雖險不得為軸。…" />
