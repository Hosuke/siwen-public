    <meta property="og:description" content="求賢之道，墨子所論求賢用賢之方。尚賢下篇設問：天下之士君子皆欲富貴而惡貧賤，然則如何可得富貴而闢貧賤？墨子答曰：「莫若爲賢。」 復申其義云：「有力者疾以助人，有財者勉以分人，有道者勸以教人。」此三者，賢人之道也。 苟能行此，則飢者得食，寒者得衣，亂者得治。墨子稱之曰「安生生」——使天下萬民皆得安寧生…" />
