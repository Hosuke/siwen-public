    <meta property="og:description" content="楊子之鄰人亡羊，既率其黨，又請楊子之豎追之。楊子曰：「嘻！亡一羊，何追者之衆？」鄰人曰：「多歧路。」既反，問：「獲羊乎？」曰：「亡之矣。」曰：「奚亡之？」曰：「歧路之中又有歧焉，吾不知所之，所以反也。」楊子戚然變容，不言者移時，不笑者竟日。門人怪之，請曰：「羊，賤畜，又非夫子之有，而損言笑者，何哉？…" />
