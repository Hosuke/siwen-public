    <meta property="og:description" content="敬慎者仁之地，溫溫恭人之義也。《小宛》以溫溫恭人、惴惴小心、戰戰兢兢、如履薄冰為戒，是敬慎之實也。仁者心存恭敬，無一事不謹，無一念不敬，則德行自此而立。敬慎非畏葸，乃心存敬畏、不敢慢易之謂。敬慎者仁之地之義，於《小宛》見之矣。 所出：《詩經 · 小宛》 — https://zh.wikisource…" />
