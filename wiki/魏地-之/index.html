    <meta property="og:description" content="又見於《詩經·葛屨》前序云：「魏地陿隘，其民機巧趨利。其君儉嗇褊急，而無德以將之。」 此序述魏國之地勢民俗及君風，以為《葛屨》諸詩之背景。魏地陿隘，故民機巧；其君儉嗇，故民心趨利而不敦厚。此魏風諸詩刺怨之所由生也。 所出：《詩經 · 葛屨》 — https://zh.wikisource.org/w…" />
