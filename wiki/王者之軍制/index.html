    <meta property="og:description" content="《荀子·議兵篇》孫卿子云：「將死鼓，御死轡，百吏死職，士大夫死行列。聞鼓聲而進，聞金聲而退，順命為上，有功次之。」不殺老弱，不獵禾稼，服者不禽，格者不舍，奔命者不獲。誅非誅其百姓，誅其亂百姓者也。誅其亂百姓者，百姓有扞其賊，則亦是賊也。兵不血刃，遠邇來服。此王者之軍制之要也。 所出：《荀子 · 議兵…" />
