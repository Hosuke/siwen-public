    <meta property="og:description" content="子貢倦於學，告仲尼曰：「願有所息。」仲尼曰：「生無所息。」子貢曰：「然則賜息無所乎？」仲尼曰：「有焉耳。望其壙，睪如也，宰如也，飯如也，鬲如也，則知所息矣。」子貢曰：「大哉死乎！君子息焉，小人伏焉。」仲尼曰：「賜！汝知之矣。人胥知生之樂，未知生之苦；知老之憊，未知老之佚；知死之惡，未知死之息也。」 …" />
