    <meta property="og:description" content="韓非子又立明君立功成名四要素之說：必得天時、人心、技能、勢位，四者兼備，而功名自成。然其中「勢」字最為緊要——有材無勢，雖賢不能制不肖；得勢位，則不推進而名自成。是故堯為匹夫不能正三家，桀為天子能制天下，非賢與不肖之異，位之高低、勢之轻重使然也。聖人功名之成，又賴乎眾助：近者結之以成，遠者譽之以名，…" />
