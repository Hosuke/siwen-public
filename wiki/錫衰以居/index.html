    <meta property="og:description" content="錫衰以居，出自《禮記·服問》，詳定諸侯卿大夫居喪服制之禮。 《傳》曰：「公為卿大夫錫衰以居，出亦如之。當事則弁絰。大夫相為，亦然。為其妻，往則服之，出則否。」 此言諸侯為卿大夫服錫衰，居家聽事皆服之。錫衰者，粗麻布所製之衰，比之正喪服為稍輕。蓋諸侯於卿大夫之喪，不若父子之親，故服錫衰以示別，而不廢國…" />
