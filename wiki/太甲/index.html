    <meta property="og:description" content="太甲，成湯適長孫也。帝太甲元年，伊尹作伊訓，作肆命，作徂后。 帝太甲既立三年，不明，暴虐，不遵湯法，亂德，於是伊尹放之於桐宮。三年，伊尹攝行政當國，以朝諸侯。 帝太甲居桐宮三年，悔過自責，反善，於是伊尹迺迎帝太甲而授之政。帝太甲修德，諸侯咸歸殷，百姓以寧。伊尹嘉之，迺作太甲訓三篇，襃帝太甲，稱太宗。…" />
