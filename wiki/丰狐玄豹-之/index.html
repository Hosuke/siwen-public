    <meta property="og:description" content="《山木》又載一事以相發明：魯侯以「敬鬼尊賢、親而行之」自居，而不免於患。夫魯國非君之皮邪？市南子以豐狐文豹為喻，謂皮之為物，固有以致之。皮之美者為災，位之尊者為累，其理一也。刳形去皮、洒心去欲，遊於无人之野，乃可全生。 所出：《莊子 · 山木》 — https://zh.wikisource.org…" />
