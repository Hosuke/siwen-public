    <meta property="og:description" content="「淳樸散而禮樂飾」乃《文子·卷十二》所載之道家批判文明之要義，描述人類從自然純樸之世，墮入禮樂人為之世之歷程。 原文云：「性失然後貴仁義，仁義立而道德廢，純樸散而禮樂飾，是非形而百姓眩，珠玉貴而天下爭。」此言揭示文明發展之悖論：人為道德之興起，恰因自然本性之喪失；而禮樂之興盛，正是淳樸散亡之徵兆。 …" />
