    <meta property="og:description" content="湯之時，自契至湯八遷。湯始居亳，從先王居。 湯征湯征|葛伯，作湯征。湯出，見野張網四面，乃去其三面，湯網|諸侯聞湯德至矣。 湯伐夏桀，作湯誓，遂伐昆吾，逐伐桀，桀敗於有娀之虛，犇於鳴條。湯既勝夏，欲遷其社，不可，作夏社。還亳，作湯誥。 湯乃改正朔，易服色，上白，朝會以晝。 所出：《史記 · 卷003…" />
