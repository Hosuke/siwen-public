    <meta property="og:description" content="葬埋之有節，乃墨子論喪葬當有節制之法也。墨子以為，人生在世，衣食者，人之生利也，然且猶尚有節；葬埋者，人之死利也，夫何獨無節於此乎？ 夫人之所以生者，衣食是賴，然聖王制為節用之教，使天下之人大取於民而不匱。夫葬埋之事，專為死者之利，而死者無知，厚斂之財悉歸糞土，豈非無益之甚者乎？ 墨子之意，以為生者…" />
