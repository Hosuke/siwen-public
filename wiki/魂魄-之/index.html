    <meta property="og:description" content="魂魄者，人身之二氣也。魂主升，浮而不滯，與神為徒；魄主降，沉而為形，與體相依。和制之云者，令二者相從而不悖、相守而不離也。津液平者，魂魄既調，則津液流通，百脈灌溉，形骸強固而無傾仆之患。修煉家以魂魄為大藥能和之本，必使浮沉相守、升降合度，乃可與言長生。 所出：《黃庭內景經 · 肝部章第十一》 — h…" />
