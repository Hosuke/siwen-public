    <meta property="og:description" content="上九「濡其首，有孚失是」，以有孚之誠，而濡首失節，是非顛倒。《知進退存亡而不失其正》者不失其正，此則失是也。是者，理之當然，義之所宜。有孚而不節，猶未免於失也。 所出：《周易 · 未濟》 — https://zh.wikisource.org/wiki/周易/未濟" />
