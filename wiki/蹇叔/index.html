    <meta property="og:description" content="蹇叔者，百里傒之友也。傒之言曰：「臣常游困於齊而乞食铚人，蹇叔收臣。臣因而欲事齊君無知，蹇叔止臣，臣得脫齊難，遂之周。周王子穨好牛，臣以養牛干之。及穨欲用臣，蹇叔止臣，臣去，得不誅。事虞君，蹇叔止臣。臣知虞君不用臣，再用其言，得脫，一不用，及虞君難：是以知其賢。」繆公聞之，使人厚幣迎蹇叔，以為上大夫…" />
