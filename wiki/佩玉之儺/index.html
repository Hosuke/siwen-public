    <meta property="og:title" content="佩玉之儺" />
    <meta property="og:description" content="又見《詩經·竹竿》：「巧笑之瑳，佩玉之儺。」 此言衞女容飾之美、威儀之盛。巧笑之瑳，齒白而笑粲然也；佩玉之儺，行止有節，玉聲相應也。夫女子在父母之邦，容儀之美，出於自然。今適異國而思歸不得，其豈不爾思之情，雖佩玉之盛、巧笑之美，亦不足以解其憂。以寫我憂|出遊以寫，正此意也。 所出：《詩經 · 竹竿》…" />
