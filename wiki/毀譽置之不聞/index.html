    <meta property="og:description" content="洪言：「世人多慕豫親之好，推暗室之密，洪以為知人甚未易，上聖之所難。浮雜之交，口合神離，無益有損。」又言：「馳逐苟達側立勢門者，共疾洪之異於己，而見疵毀。洪之為人，信心而行，毀譽皆置於不聞。」 所出：《抱朴子 · 卷52》 — https://zh.wikisource.org/wiki/抱朴子/外…" />
