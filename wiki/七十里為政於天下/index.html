    <meta property="og:description" content="七十里為政於天下者，孟子所述湯以德治天下之故事也，出於《梁惠王下》第十一章。 時齊宣王既取燕，諸侯謀伐齊，宣王患之，問孟子以為何策。孟子對曰： 「臣聞七十里為政於天下者，湯是也。未聞以千里畏人者也。」 孟子乃述湯之往事以為楷式。昔者湯始征，自葛國始，天下信之。東面而征，西夷怨；南面而征，北狄怨，曰：…" />
