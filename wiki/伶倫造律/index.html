    <meta property="og:description" content="帝使伶倫往大夏之西阮榆之谿、昆侖之陰懈谷，採鍾龍之竹，取其竅厚均者，斷兩節，間長七寸七分，吹之為黃鍾之音。十一月律為黃鍾，謂冬至一陽生萬物之始也。帝能理日月之行，調陰陽之氣，為十二律呂，雄雌各六也。律管長尺，六孔，十二月之音稟之，以竹取自然圓，以玉取堅貞溫潤。時有女媧之後容成氏，善知音律，始造律曆。…" />
