    <meta property="og:description" content="燮和天下者，相臣之職也。 太保奉大誥以誥諸侯曰：「率循大卞，燮和天下，用答揚文武之光訓。」 卞，法也。循法度以和之，使天下各得其和，此成康之際所以刑措不用也。 所出：《尚書 · 顧命》 — https://zh.wikisource.org/wiki/尚書/顧命" />
