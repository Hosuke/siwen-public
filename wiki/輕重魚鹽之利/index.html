    <meta property="og:description" content="「通於侈靡，而士可戚。」又曰：「本事不得立。」本善而末事起，不侈，本事不得立。選賢舉能不可得，惡得伐不服用？國富而鄙貧，莫盡如市。市也者，勸也，勸者所以起。通魚鹽之利，達輕重之術，使商賈流通，財貨周遍，則民富而國强。 所出：《管子 · 第35篇侈靡》 — https://zh.wikisource.…" />
