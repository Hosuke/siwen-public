    <meta property="og:description" content="公門有稅齊衰，語出《禮記·服問》，為喪服禮制中著名之例外原則。 《傳》曰：「凡見人無免絰，雖朝於君，無免絰。唯公門有稅齊衰。」 此言凡往見他人，不可除去首絰；雖入朝見君，亦不可免絰。絰者，麻帶也，男子首絰、女子腰絰，皆表居喪之義，不可輕易除去。 然有一例外：至諸侯之門，則可稅齊衰。齊衰者，次於斬衰之…" />
