    <meta property="og:description" content="帝朝而問右丞相周勃：「天下一歲決獄幾何？」勃謝曰：「不知。」問：「天下一歲錢穀出入幾何？」又謝不知，汗出沾背，愧不能對。問左丞相陳平，平曰：「有主者。」上曰：「主者謂誰？」平曰：「陛下即問決獄，責廷尉；問錢穀，責治粟內史。」上曰：「苟各有主者，而君所主者何事也？」平對曰：「主臣！宰相者，上佐天子理陰…" />
