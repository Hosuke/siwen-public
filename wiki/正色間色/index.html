    <meta property="og:description" content="《詩經/綠衣》云「綠衣黃裏」「綠衣黃裳」，以正色之黃與間色之綠相混淆，興嫡妾之位顚倒。黃者，土之正色，古以為尊；綠者，蒼黃之閒色，古以為賤。詩人見綠衣在外而黃裳在內，是尊卑易位、陰陽失常之象，傷己之失位，思我思古人|古人之正道也。 所出：《詩經 · 綠衣》 — https://zh.wikisour…" />
