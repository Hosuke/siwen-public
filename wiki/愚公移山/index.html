    <meta property="og:description" content="《湯問篇》又載愚公之事。其文曰：「太行、王屋二山，方七百里，高萬仞，本在冀州之南，河陽之北。北山愚公者，年且九十，面山而居，懲山北之塞，出入之迂也，聚室而謀。」 愚公率子孫荷擔者三夫，叩石墾壤，箕畚運於渤海之尾。鄰人京城氏之孀妻有遺男，始齔，跳往助之。河曲智叟笑而止之，愚公長息曰：「汝心之固，固不可…" />
