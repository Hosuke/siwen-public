    <meta property="og:description" content="「今我來思，雨雪霏霏」，采薇末章之句也。楊柳依依言往時之春，此言來思之冬，景物變換，歲月遞易，征人久戍始歸，而所見者唯雨雪載途而已。行道遲遲，載渴載飢，歸途之艱不異出征之日；莫知我哀，哀而不怨，詩教温柔之旨也。《詩》以情景交融、今昔對照寫征戍之感，為千古羈旅詩之祖。 所出：《詩經 · 采薇》 — h…" />
