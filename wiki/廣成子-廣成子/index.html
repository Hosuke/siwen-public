    <meta property="og:description" content="廣成子居崆峒之山石室之中，黃帝聞而造焉，曰：「敢問至道之要。」廣成子曰：「爾治天下，雲不待族而雨，木不待黃而落，奚足以語至道哉。」黃帝退而閒居，三月復往見之，膝行而前，再拜請問治身之道。 答曰：「至道之精，窈窈冥冥；至道之極，昏昏默默。無視無聽，抱神以靜，形將自正。必靜必清，毋勞爾形，毋搖爾精，乃可…" />
