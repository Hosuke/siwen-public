    <meta property="og:title" content="天之降罰" />
    <meta property="og:description" content="天之降罰者，墨子所言天鬼賞罰之道也。天下雖尚同乎天子，而未尚同乎天者，則天之降罰將猶未止也。 夫天之降罰奈何？墨子以為：「當若天降寒熱不節，雪霜雨露不時，五穀不孰，六畜不遂，疾葘戾疫，飄風苦雨，荐臻而至者，此天之降罰也，將以罰下人之不尚同乎天者也。」 寒熱失節、雪霜不時、五穀不熟、六畜不遂、疾疫大作…" />
