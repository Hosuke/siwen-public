    <meta property="og:description" content="抱朴子引「和氏之璧」之典以喻道之難識。云：「見玉而指之曰石，非玉之不真也，待和氏而後識焉。見龍而命之曰蛇，非龍之不神也，須蔡墨而後辨焉。」 和氏者，卞和也，荊山抱玉，三獻而見刖，卒以為天下無識寶者。抱朴子借此以喻：世之不信神仙者，非仙道之不真，待真人而後能識之。俗儒碌碌，守株不信至事者，皆病於偏枯拘…" />
