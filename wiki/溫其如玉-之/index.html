    <meta property="og:description" content="《小戎》云「言念君子，溫其如玉」，與《禮記·聘義》「溫潤而澤」、《說文》「玉，石之美有五德」相發明。君子溫和如玉，無棱角之傷人，有內美之照物。詩人以此形容遠戍之夫，見其德性之善，亦閔者之心所繫也。 所出：《詩經 · 小戎》 — https://zh.wikisource.org/wiki/詩經/小戎" />
