    <meta property="og:description" content="墨子論義之尊貴，以為萬事莫貴於義。《墨子·貴義》載墨子之言：「萬事莫貴於義。」並以切身之事喻之：若人曰「予以子冠履，而斷子之手足」，則必不為，以冠履不若手足之貴也；若人曰「予以子天下，而殺子之身」，則必不為，以天下不若身之貴也。然而爭一言以相殺，是貴義於其身也——為義而死，重於一身。 此說與儒家之義…" />
