    <meta property="og:description" content="楚惠王召勝歸楚，葉公諫曰：「勝好勇而陰求死士，殆有私乎！」惠王不聽，使居邊邑鄢，號白公。歸楚三年而吳誅子胥。已而勝怨鄭殺其父，陰養死士求報鄭，請伐鄭，楚令尹子西許之。兵未發而晉伐鄭，鄭求救於楚，白公怒曰：「非鄭之仇，乃子西也。」自礪劍欲殺子西。子西笑曰：「勝如卵耳，何能為也。」其後四歲，白公與石乞襲…" />
