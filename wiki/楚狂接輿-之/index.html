    <meta property="og:description" content="楚狂接輿遊孔子之門而歌曰：「鳳兮鳳兮，何如德之衰也！來世不可待，往世不可追也。天下有道，聖人成焉；天下无道，聖人生焉。方今之時，僅免刑焉。福輕乎羽，莫之知載；禍重乎地，莫之知避。已乎已乎，臨人以德；殆乎殆乎，畫地而趨！迷陽迷陽，无傷吾行。吾行郤曲，无傷吾足。」 所出：《莊子 · 人間世》 — htt…" />
