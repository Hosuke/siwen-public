    <meta property="og:description" content="陳侯不聽五父之言，君子以為長惡不悛。遂不許與鄭平。 君子引《商書》曰：「惡之易也，如火之燎于原，不可鄉邇，其猶可撲滅？」 周任有言曰：「为国家者，见恶，如农夫之务去草焉，芟夷蘊崇之，绝其本根，勿使能殖，则善者信矣。」 夫治苗者去蟊賊，去小人亦然。為國而不去惡，猶種而不除草，害苗之嘉穀也。 所出：《春…" />
