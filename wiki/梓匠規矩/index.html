    <meta property="og:description" content="「梓匠輪輿，能與人規矩，不能使人巧。」此語出《孟子·盡心下》，以匠人授法為喻，闡明師者所能傳授與求學者所當自求之別。 梓匠輪輿，梓人、匠人、造輪之工、輿人之屬，皆百工之人也。規者，圓規；矩者，方矩。匠人得以其器、其法傳之他人，而不能使之巧。巧者，心手相應、技藝精湛，非可外鑠，必由自得。 此喻所要義者…" />
