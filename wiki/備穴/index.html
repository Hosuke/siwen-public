    <meta property="og:description" content="備穴，出自《墨子》，乃墨子論守城諸篇之一，專述防禦敵人穴土攻城之術。敵軍攻城之時，往往挖地道以傾城壁，備穴即為對此而設。其法有三要：一曰察候，城內建高樓以窺敵人舉動，見敵有異動則防其穿穴；二曰聽穴，穿井城內，五步一井，令聽者伏罌而聽，審知穴之所在；三曰迎穴，穿井以迎之，鑿穴以迎敵，投以煙火，熏敵於穴…" />
