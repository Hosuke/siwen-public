    <meta property="og:description" content="子路之死見子路結纓而死。衞蒯聵作亂，孔悝被劫，出公輒奔魯。子路聞亂而入，欲救孔悝，曰：「太子無勇，若燔臺，必舍孔叔。」及門，公孫敢拒之，子路曰：「利其祿，必救其患。」遂入。石乞、盂黶以戈擊之，割其纓。子路曰：「君子死，冠不免。」結纓而死。孔子聞亂，歎曰：「嗟乎！柴也其來乎？由也其死矣。」 所出：《史…" />
