    <meta property="og:description" content="葉公子高問政於仲尼，曰：「善為政者，若之何？」仲尼對曰：「善為政者，遠者近之，而舊者新之。」 墨子聞之，批評此答以為未得要領。墨子以為葉公子高未得其問，仲尼亦未得其所以對。蓋葉公子高豈不知善為政者之遠者近也而舊者新是哉？彼所問者，乃所以為之若之何之方法也。仲尼乃不以人之所不智告人，而以所智告之，是答…" />
