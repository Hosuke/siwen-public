    <meta property="og:description" content="《禮記·祭統》篇末揭示一重要命題：「祭者，孝之本也已」。此言一出，遂為儒家祭祀哲學之核心義理。 夫祭之所以為孝之本，蓋有其故。《祭統》首段明言：「夫祭者，非物自外至者也，自中出生於心也，心怵而奉之以禮。」祭祀之發動，非由外鑠，乃根於人心之悅怛。孝子之心，感念親恩，油然生敬，此敬心外發於禮儀，便是祭祀…" />
