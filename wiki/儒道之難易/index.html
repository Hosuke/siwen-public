    <meta property="og:description" content="抱朴子論儒道之業，嘗有「儒者，易中之難也；道者，難中之易也」之辨。 道家之難者：棄交遊、委妻子、謝榮名、損利祿，割粲爛於其目，抑鏗鏘於其耳，恬愉靜退，獨善守己，謗來不戚，譽至不喜，睹貴不欲，居賤不恥。此乃內修之功，需克服人情之常態。 儒者之難者：鉤深致遠，錯綜典坟，該河洛之籍籍，博百氏之云云，德行積…" />
