    <meta property="og:description" content="河上公注「跂者不立」之義，兼及「跨者不行」。跂者，進也。貪權慕名，進取功榮，則不可久立行道。跨者，自以為貴而跨於人，眾共蔽之，使不得行。自見、自是、自伐、自矜，皆非修身之道。見利則忘義，矜名則失實，是以聖人法道而不貴功、尚德而不居位也。 所出：《老子河上公章句 · 苦恩》 — https://zh.…" />
