    <meta property="og:description" content="坤六三曰：「含章，可貞。或從王事，无成有終。」 坤象曰：「含章可貞，以時發也。或從王事，知光大也。」 坤文言曰：「陰雖有美，含之。以從王事，弗敢成也。地道也，妻道也，臣道也。地道无成，而代有終也。」 言陰含文明之美，時而後發。從事於王，不敢居成功，但求善終。此地道、臣道之義，柔順而無成，以終為貴也。…" />
