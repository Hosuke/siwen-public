    <meta property="og:description" content="《禮記·經解》提出治國之要道，以義、信、和、仁四德為霸王之器。孔子明言：「義與信、和與仁，霸王之器也。有治民之意而無其器，則不成。」此四者非僅道德品質，乃治國之實用器具，無之則意圖雖善，終不能成治。 其義各有分疏：發號出令而民悅，謂之和；上下相親，謂之仁；民不求所欲而得之，謂之信；除去天地之害，謂之…" />
