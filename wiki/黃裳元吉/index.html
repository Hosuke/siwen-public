    <meta property="og:description" content="坤六五曰：「黃裳，元吉。」 坤象曰：「黃裳元吉，文在中也。」 坤文言申之曰：「君子黃中通理，正位居體，美在其中，而暢於四支，發於事業，美之至也。」 言黃者，中之色；裳者，下體之服。居中正之位，柔順以守，文德在中，美暢於外，此坤之至美者也。 所出：《周易 · 坤》 — https://zh.wikis…" />
