    <meta property="og:description" content="唐若山，素好方術，所至之處必會爐鼎之客，晚歲尤篤，以潤之府庫官錢市藥。有一老叟至，自言有長生之道，留月餘，所論皆非丹石之旨，而好肥鮮美酒珍膳。從容謂若山：「君家百口，所給常若不足，一旦居閒，何以為贍。帑藏錢帛頗有侵用，誠為憂之。」若山驚曰：「某此不久將有交代，常為憂而計無所出。」叟曰：「無多慮也。」…" />
