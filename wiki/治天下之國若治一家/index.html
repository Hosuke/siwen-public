    <meta property="og:description" content="治天下之國若治一家，乃墨子以為尚同之效大成之境的宣言，謂一旦天下同一天下之義，則治理天下如治理一家，使天下之民如使一人。 此文出於篇末，墨子云：「故曰：治天下之國若治一家，使天下之民若使一夫。」蓋以為尚同之行，若能貫徹於天下，則天下如一家，而治理之功成矣。 其理何在？以尚同之制，自天而下，至於天子、…" />
