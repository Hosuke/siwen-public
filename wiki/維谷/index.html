    <meta property="og:description" content="又《桑柔》云：「朋友已譖，不胥以穀。人亦有言：進退維谷。」 維谷者，兩山之間謂之谷。進退皆谷，則無路可出。朋友相譖，無以相善，人之處境，進亦窘迫，退亦窘迫，無所往而可也。此以山谷之隘，喻人事之困，後世遂以「進退維谷」為陷入兩難之境的成語。 所出：《詩經 · 桑柔》 — https://zh.wiki…" />
