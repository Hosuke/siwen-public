    <meta property="og:description" content="言極則怒，怒則說者危，非賢者孰肯犯危？而非賢者也，將以要利矣。要利之人，犯危何益？故不肖主無賢者。無賢則不聞極言，不聞極言則姦人比周、百邪悉起，若此則無以存矣。凡國之存也，主之安也，必有以也。不知所以，雖存必亡，雖安必危，所以不可不論也。 所出：《呂氏春秋 · 卷二十三》 — https://zh.…" />
