    <meta property="og:description" content="《湯問篇》載：「孔子東游，見兩小兒辯鬬，問其故。」 兩兒之辯，一曰日始出時近、日中時遠，一曰日初出遠、日中時近。 第一兒曰：「日初出大如車蓋，及日中則如盤盂，此不為遠者小而近者大乎？」 第二兒曰：「日初出滄滄涼涼，及其日中如探湯，此不為近者熱而遠者涼乎？」 孔子不能決。兩小兒笑曰：「孰為汝多知乎？」…" />
