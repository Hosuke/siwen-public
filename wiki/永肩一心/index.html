    <meta property="og:description" content="《尚書·盤庚》又有「永肩一心」之語，盤庚既遷殷邑，誡臣工曰：「無總于貨寶，生生自庸。式敷民德，永肩一心。」言勿聚斂財貨，當勤於民事；施德於民，務使君臣一心，永不改也。 所出：《尚書 · 盤庚下》 — https://zh.wikisource.org/wiki/尚書/盤庚下" />
