    <meta property="og:description" content="詩言「載驅薄薄，簟茀朱鞹」，華車疾馳，車飾甚盛。簟，竹席也；茀，車蔽也；朱鞹，紅色皮革以飾車闌者也。車飾之美如此，而「齊侯之子、衛侯之妻、東宮之妹、泰山之魯」者，亦各有其飾，互相映發。是以知先王之世，車馬輿服皆有等威，非徒以便行走，實寓辨貴賤、明尊卑之義焉。 所出：《詩經 · 載驅》 — https…" />
