    <meta property="og:description" content="僖之元年，齊桓公遷邢于夷儀。二年，封衛于楚丘。邢遷如歸，衛國忘亡。言邢人播遷，而齊桓公遷之如歸，無有怨咨也；衛人久經離散，而一旦得所安，慶其亡而復存也。 夫桓公之霸，存亡國、繼絕世，功德施於天下如此。邢、衛皆被發左衽之餘，而能復其宗廟社稷，蓋齊侯之功，亦聖王之遺意也。 所出：《春秋左氏傳 · 閔公》…" />
