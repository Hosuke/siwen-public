    <meta property="og:description" content="又，建元三年，東甌告急，天子問太尉田蚡。蚡對曰：「越人相攻擊，固其常，又數反覆，不足以煩中國往救也。自秦時棄弗屬。」蚡以為越人自相攻擊，不足烦中國，既乖人臣之義，亦昧綏遠之恩也。 所出：《史記 · 卷114》 — https://zh.wikisource.org/wiki/史記/卷114" />
