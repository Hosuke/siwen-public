    <meta property="og:description" content="便其習而義其俗，乃墨子批判厚葬久喪者之論理也。墨子以為，當世之君子，言必稱堯舜禹湯文武之道，然行則相非，皆所謂「便其習而義其俗」者耳。 墨子舉三事以為說：其一，越之東有輆沐之國，其長子生則解而食之，謂之宜弟；其二，楚之南有炎人之國，其親戚死則朽其肉而棄之；其三，秦之西有儀渠之國，其親戚死則聚柴薪而焚…" />
