    <meta property="og:description" content="聖人在天下歙歙者，收斂其心，無所偏主也。 夫欲有常心者，心有所主也；心有所主者，必有所偏也；有所偏則天下之心析矣。惟聖人無常心，是以天下之心渾然而合。為天下渾其心者，不以己意宰之，而使民自遂其情。百姓注耳目而聖人皆孩之，皆由此無心而至也。德善之德信，亦本乎此渾然之心而已。 所出：《道德經 (王弼本)…" />
