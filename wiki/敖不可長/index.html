    <meta property="og:description" content="敖不可長乃《禮記·曲禮上》所載修身要旨。其文云：「敖不可長，欲不可從，志不可滿，樂不可極。」言四者皆當節制，而敖居其首。 敖者，驕傲自大之謂也。聖人以為，人若有敖，則必不能敬賢、近善。蓋敖者，不知天高地厚，自以為是，視人如草芥。此與仁-儒學-之|仁之道相悖，與禮-儒學-之|禮之本相乖。 夫敖不可長者…" />
