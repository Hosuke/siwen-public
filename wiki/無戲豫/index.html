    <meta property="og:description" content="《詩·大雅·板》又言「敬天之怒，無敢戲豫」，此敖不可長欲不可從之義也。戲豫者，敖不可長之漸；馳驅者，欲不可從之流。 戒人君不可輕天之威，而逸豫亡身，淫佚敗德。驕人好好，終至悔吝叢生也。 所出：《詩經 · 板》 — https://zh.wikisource.org/wiki/詩經/板" />
