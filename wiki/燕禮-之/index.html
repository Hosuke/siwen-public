    <meta property="og:description" content="《詩經·吉日》末章云「以御賓客，且以酌醴」，田獵既畢，設醴酒以待賓客，此燕饗之禮也。歲時田獵所獲，非獨供天子一人之膳，必分與射侯|射者及燕禮|賓客共之，故田事之終即是燕享之始。《吉日》之詩，以「酌醴」作結，與《大雅·鳧鷖》「公尸燕飲」之義相類，皆見王者接下以禮、恩義兼隆之旨。 所出：《詩經 · 吉日…" />
