    <meta property="og:description" content="宋魚石出奔楚，又復入于彭城。 成公十五年，宋華元出奔晉，自晉歸于宋。宋殺其大夫山。魚石出奔楚。 至成公十八年，宋魚石復入于彭城。楚子、鄭伯伐宋，宋人迎魚石入彭城，遂據之以叛。 彭城，宋之要邑也。魚石恃楚、鄭之援，復入彭城，宋室外患內患相踵，蓋自華元出奔而國政失序矣。 所出：《春秋公羊傳 · 成公》 …" />
