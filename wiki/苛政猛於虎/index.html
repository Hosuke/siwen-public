    <meta property="og:description" content="「苛政猛於虎」出自《禮記·檀弓下》，為孔子過泰山時所見聞之一則寓言。其文云： 孔子過泰山側，有婦女哭於墓者而哀，夫子式而聽之。使子貢問之曰：「子之哭也，壹似重有憂者。」而曰：「然，昔者吾舅死於虎，吾夫又死焉，今吾子又死焉。」夫子曰：「何為不去也？」曰：「無苛政。」夫子曰：「小子識之，苛政猛於虎也。」…" />
