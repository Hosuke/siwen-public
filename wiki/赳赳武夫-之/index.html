    <meta property="og:description" content="赳赳，音糾糾，威武雄健之貌。單字之赳，按《說文》解為「輕勁有材力」，《釋訓》稱「赳，材也」。赳赳武夫，言其人輕捷有力、雄武可用。 兔罝之網，肅肅而立；布網之人，赳赳其武。公侯干城、好仇、腹心，皆賴此赳赳武夫以成。是詩見後妃之化行，賢人衆多，莫不好德，故武夫亦得躋於公侯之側。 所出：《詩經 · 兔罝》…" />
