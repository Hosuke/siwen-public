    <meta property="og:description" content="李翼，河上公之師。師真人王探，得道仙去。以道傳河上公，授《道德》五千文，深究谷神玄牝之旨。又遇異人傳《易》，洞曉天地陰陽造化。探蹟索隱，鉤深致遠，與天地合其德，與鬼神合其吉凶。尸居而龍見，淵默而雷聲，神動而天隨。登天遊霧，撓挑無極。功成道備，玄德升聞，天帝授書為西嶽仙卿。 所出：《歷世真仙體道通鑑 …" />
