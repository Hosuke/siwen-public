    <meta property="og:description" content="誅諸呂、立文帝，功皆出太尉周勃。勃自以為功大，欲讓尊位，乃謝病相位讓陳平。陳平曰：「時稱兵不如臣，至誅諸呂，臣功亦不如君。願以右丞相讓。」帝乃以勃為右丞相，位次第一；平為左丞相，位次第二。賜勃金千斤，增封三千戸。 所出：《史記 · 卷056》 — https://zh.wikisource.org/…" />
