    <meta property="og:description" content="武王伐紂 《墨子·非攻下》詳述武王伐紂之事，以證「誅」而非「攻」之義。 紂之世，「天不序其德，祀用失時，兼夜中十日，雨土于薄，九鼎遷止，婦妖宵出，有鬼宵吟，有女爲男，天雨肉，棘生乎國道」，天象人事皆呈亂兆。周之岐社有赤烏銜珪而降，宣言：「天命周文王伐殷有國。」泰顛來賓，河出綠圖，地出乘黃，皆天瑞之象…" />
