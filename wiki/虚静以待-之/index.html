    <meta property="og:description" content="虚静以待之說，見於申子之言及堂谿公問玉巵。 申子云：「惟無為可以規之。」唐易之言弋引鄭長者之言：「虚無無見者，廪也。」皆虛静無為之義。 堂谿公問玉巵言：昭侯聞玉巵無當之喻，「欲發天下之大事，未嘗不獨寢」——虛静慎言之驗也。 賞罰以信必本於虛静，否則任譽姦之鼠竊柄而不殺其狗則酒酸矣。 所出：《韓非子 …" />
