    <meta property="og:description" content="自得者，全其身者也。全其身，則與道為一矣。夫有天下者，豈必攝權持勢、操殺生之柄而以行其號令邪？吾所謂有天下者，非謂此也，自得而已。自得，則天下亦得我矣。吾與天下相得，則常相有，己又焉有不得容其間者乎！是故有以自得之也，喬木之下，空穴之中，足以適情；無以自得也，雖以天下為家，萬民為臣妾，不足以養生也。…" />
