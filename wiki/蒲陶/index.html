    <meta property="og:description" content="自大宛以西至安息，國雖頗異言，然大同俗，相知言。宛左右以蒲陶為酒，富人藏酒至萬餘石，久者數十歲不敗。俗嗜酒，馬嗜苜蓿。漢使取其實來，於是天子始種苜蓿、蒲陶肥饒地。及天馬多，外國使來眾，則離宮別觀旁盡種蒲萄、苜蓿極望。 所出：《史記 · 卷123》 — https://zh.wikisource.or…" />
