    <meta property="og:description" content="下而取者，兼畜人之別名。言國之大小，皆持謙畜人，知下之道也。更以義相取，大國以下小國而兼畜之，小國以下大國而臣事之，更迭以義而相取。《老子》曰「故或下以取，或下而取」，言彼此皆因謙下而有所得，此之謂也。 所出：《老子河上公章句 · 謙德》 — https://zh.wikisource.org/wi…" />
