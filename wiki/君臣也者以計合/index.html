    <meta property="og:description" content="本篇闡發君臣之際：「明主在上，則人臣去私心行公義；亂主在上，則人臣去公義行私心。」又云：「君臣也者，以計合者也。至夫臨難必死，盡智竭力，為法為之。」臣之情，害身無利；君之情，害國無親。害身而利國者臣弗為，害國而利臣者君不行。先王明賞以勸之，嚴刑以威之，賞刑明則民盡死，兵強主尊。此君臣以法相維之道也。…" />
