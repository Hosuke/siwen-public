    <meta property="og:description" content="從輕而重，語出《禮記·服問》，為喪服制度中一大原則，謂喪服之輕重可隨親屬關係之變化而升等。 《傳》曰：「有從輕而重，公子之妻為其皇姑。」此言公子之妻為其翁姑（即丈夫之父母）服喪，由輕而重。蓋未嫁之時，與夫家並無服屬；既嫁之後，則俨然為其家人，自當依禮制服三年之喪。此隨其身分之轉變，而服制因之升等也。…" />
