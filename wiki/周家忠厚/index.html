    <meta property="og:description" content="《行葦》詩序云：「周家忠厚，仁及草木，故能內睦九族，外尊事黃耇，養老乞言，以成其福祿焉。」言周家以忠厚立國，仁德推及草木，無所不至，故能九族和睦，尊事黃耇，行養老乞言之禮，福祿自此而成。 所出：《詩經 · 行葦》 — https://zh.wikisource.org/wiki/詩經/行葦" />
