    <meta property="og:description" content="「牛山之木」出自《孟子·告子上》第八章，乃孟子心性學說之精要。孟子以牛山之木為喻，闡明人性本善，而善性可為外物所侵奪之理。 孟子言：「牛山之木嘗美矣。以其郊於大國也，斧斤伐之，可以為美乎？」牛山昔日本有茂林，靠近大國都市，斧斤日日砍伐，牛羊復從而牧之，以是山木濯濯。人見其濯濯，以為未嘗有材——此豈山…" />
