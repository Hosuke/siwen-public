    <meta property="og:description" content="帝盤庚之時，殷已都河北，盤庚渡河南，復居成湯之故居，迺五遷，無定處。殷民咨胥皆怨，不欲徙。 盤庚乃告諭諸侯大臣曰：「昔高后成湯與爾之先祖俱定天下，法則可修。舍而弗勉，何以成德！」乃遂涉河南，治亳，行湯之政，然後百姓由寧，殷道復興。諸侯來朝，以其遵成湯之德也。 所出：《史記 · 卷003》 — htt…" />
