    <meta property="og:description" content="《抱朴子·卷21》亦論知人之難，其言曰： 咸謂勇力絕倫者則上將之器，洽聞治亂者則三九之才。然張飛關羽萬人之敵，而皆喪元辱主；孔融邊讓文學邈俗，而並不達治務。鄧禹馬援田間諸生，而善於用兵；蕭何曹參不涉經誥，而優於宰輔。 爾則知人果未易也。欲試可乃已，則恐成折足覆餗；欲聽言察貌，則或似是而非，真偽混錯。…" />
