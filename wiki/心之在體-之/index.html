    <meta property="og:description" content="心之在體君之位：《管子》云：「心之在體，君之位也。九竅之有職，官之分也。心處其道，九竅循理；嗜欲充益，目不見色，耳不聞聲。」是心術者無為而制竅者之義，以心喻君，以竅喻臣，明人君虛靜無為、令百官各守其分之理。 所出：《管子 · 第36篇心術上》 — https://zh.wikisource.org/…" />
