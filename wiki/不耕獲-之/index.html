    <meta property="og:description" content="又兼「不菑畬」之義。《易》曰：「不耕獲，不菑畬，則利有攸往。」蓋言耕焉而望其獲，菑焉而希其畬，皆非无妄之道。唯因其自然而為，不先事以冀其成，斯所以為无妄也。 所出：《周易 · 无妄》 — https://zh.wikisource.org/wiki/周易/无妄" />
