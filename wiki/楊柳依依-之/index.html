    <meta property="og:description" content="「昔我往矣，楊柳依依」，采薇末章起興之辭也。依依，狀柳枝輕柔隨風之態。雨雪霏霏對舉，春柳冬雪，今昔殊候，以寫征戍之久、思歸之切。《經解》以為詩教之温柔敦厚，正在言近旨遠：以眼前之景，寓萬里之思；《采薇》末章尤為後世詩家所祖。 所出：《詩經 · 采薇》 — https://zh.wikisource.…" />
