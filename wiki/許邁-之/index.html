    <meta property="og:description" content="許邁字叔玄，小名映，丹陽句容人，世為冑族。總角好道，潛志幽契，自改名遠遊。娶吳郡孫氏女，曾從郭璞筮卦，遇大壯之大有上六爻，璞謂映曰：「君無吉自天，宜學輕舉之道。」 初，鮑說授以中部之法及三皇內文。一旦辭家，往而不返，束入臨安懸霤山，服木黃精，注心希微，日夜無問。數年，密感玄虛太一真人、定錄茅君降授上…" />
