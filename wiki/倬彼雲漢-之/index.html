    <meta property="og:description" content="倬，大也；雲漢，天河也。詩言「倬彼雲漢，昭回于天」，言天河廣大，光耀旋轉於天，赫然在上。今旱魃為虐，天亦曾不回而恤之耶？旱至於天象昭明而不能回，則旱之甚可知也。 所出：《詩經 · 雲漢》 — https://zh.wikisource.org/wiki/詩經/雲漢" />
