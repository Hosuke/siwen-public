    <meta property="og:description" content="人告楚王信反，陳平謂漢王曰：「古者天子巡狩，會諸侯。南方有雲夢，陛下弟出偽遊雲夢，會諸侯於陳。陳之西界，聞天子以好出遊，其勢必无事而郊迎謁。謁，而陛下因禽之，此特一力士之事耳。」帝以為然，遂發使告諸侯會，偽遊雲夢。果郊迎道中，豫具武士，至即執縛之，載後車。會諸侯於陳，盡定其地。 所出：《史記 · 卷…" />
