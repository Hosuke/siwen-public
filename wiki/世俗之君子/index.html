    <meta property="og:description" content="墨子論世俗君子之乖謬：彼輩貧而謂之富則怒，無義而謂之有義則喜。墨子以為此豈不悖哉！ 此論揭示墨子對道德偽善之深刻批判。世人之義-儒學-之|汲汲於名者，令墨子深感憂慮。真正的君子當以求明善誠身為務，而非喜悅於空洞之名號。此與上文天下之良寶之義相表裏，皆明真正的義行當以利民為準，非以博取虛名為歸。" />
