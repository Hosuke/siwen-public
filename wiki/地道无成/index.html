    <meta property="og:description" content="文言釋坤卦「地道也，妻道也，臣道也」曰：「地道無成，而代有終也。」坤道至柔，承天而行，滋生萬物而不自有，化育萬類而不居功，是謂「無成」。然萬物得成，是為「代有終」——代天以成其終事也。此與地道之義互通，而闡坤德之精微。 所出：《周易 · 文言》 — https://zh.wikisource.org…" />
