    <meta property="og:description" content="君子比德於玉一章，出自《禮記·聘義》，為孔子答子貢之問而發。子貢問曰：「君子貴玉而賤玟者何也？為玉之寡而玟之多與？」孔子非之，謂非以其多寡論貴賤，乃以玉之德比君子之德，故君子貴之。 孔子歷數玉之十一德，以配仁義禮智諸端： 一、溫潤而澤，仁也——玉之色澤溫和而有光潤，以比仁者惠澤及人； 二、縝密以栗，…" />
