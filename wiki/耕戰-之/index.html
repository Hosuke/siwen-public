    <meta property="og:description" content="《商君書 · 卷五》外內篇云：故為國者，邊利盡歸於兵，市利盡歸於農。邊利盡歸於兵者，彊；市利盡歸於農者，富。故出戰而彊，入休而富者，王也。又君臣篇云：今世君不然，釋法而以知，背功而以譽，故軍士不戰而農民流徙。民去農戰而為之，故農戰之民日寡，而游食者愈眾，則國亂而地削，兵弱而主卑。 所出：《商君書 ·…" />
