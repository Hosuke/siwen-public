    <meta property="og:description" content="禁祝之法乃道術之一種，以氣禁制邪惡之事。抱朴子稱吳越有禁祝之法，「甚有明驗」。其術以氣為用，不必借助符呪文字，而以體內之氣感通外物，使之從己所欲。 禁祝之功用有六： 一、防疫：入大疫之中，與病人同床而不染。 二、禁鬼：以炁禁之，邪魅山精皆即絕。 三、辟毒：入山林溪毒蝮蛇之地，以炁禁之，能辟方數十里。…" />
