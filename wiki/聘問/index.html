    <meta property="og:description" content="天王使南季來聘，《穀梁傳》曰：聘，問也。聘諸侯，非正也。聘者，天子遣使問候於諸侯之禮。然聘諸侯而非問天王，是以下問上，故《春秋》以為非正。蓋聘問之禮，當以上逮下為正，以下聘上則非禮之正也。 所出：《春秋穀梁傳 · 隱公》 — https://zh.wikisource.org/wiki/春秋穀梁傳/…" />
