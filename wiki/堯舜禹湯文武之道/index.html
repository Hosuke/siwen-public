    <meta property="og:description" content="尚賢下篇又論「堯舜禹湯文武之道」，墨子設問：然昔吾所以貴堯舜禹湯文武之道者，何故以哉？以其唯毋臨衆發政而治民，使天下之爲善者可而勸也，爲暴者可而沮也。然則此尚賢者也，與堯舜禹湯文武之道同矣。 又舉三賢臣之例：舜耕於歷山，堯得之服澤之陽，立爲天子；伊尹爲莘氏女師僕，湯得而舉之，立爲三公；傅說居北海之洲…" />
