    <meta property="og:title" content="我欲獨異於人而貴食母" />
    <meta property="og:description" content="帛書本此句作「吾欲獨異於人而貴食母」，「吾」字與「我」字互見。食母者，以道為母、取給於道也。泊焉未兆言其靜，昏昏昭昭言其智，累呵若畏四隣言其戒，而此句言其志。世人馳逐，修道者返本；世人逐外，修道者取給於道。歸根復命，見素抱樸，皆此志之驗也。 所出：《老子 (帛書本) · 章二十》 — https:/…" />
