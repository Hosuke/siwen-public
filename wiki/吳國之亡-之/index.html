    <meta property="og:description" content="吳王夫差還自黃池，息民不戒。越大夫種以為時不可失，獻襲吳之策：「今吳民既罷，而大荒荐饑，市無赤米，囷鹿空虛，其民必移就蒲蠃於東海之濱。天占既兆，人事又見，我蔑卜筮矣。王若今起師以會，奪之利，無使夫悛。」越王善之，乃大戒師以伐吳。 楚申包胥使於越，越王問「何以戰」，包胥對以「智為始，仁次之，勇次之」，…" />
