    <meta property="og:description" content="坤六四曰：「括囊，无咎无譽。」 坤象曰：「括囊无咎，慎不害也。」 坤文言曰：「天地變化，草木蕃；天地閉，賢人隱。易曰：『括囊，无咎，无譽。』蓋言謹也。」 言括結囊口以藏物，喻賢人晦藏其知，以防世患。天地閉塞之時，賢人當括囊不言，方可无咎。慎之至也。 所出：《周易 · 坤》 — https://zh.…" />
