    <meta property="og:description" content="哲夫成城，哲婦傾城。朱熹云：「城，猶言男也。傾，猶言女也。」又《詩集傳》云：「哲夫成城，則智有所立；哲婦傾城，則智有所溺。」孔穎達疏：「丈夫明哲，則能興起城國；妇人明哲，則將傾覆邦家。」詩人以此刺褒姒之用智以傾周室，與哲夫成城相對為文，明智男女之用殊途，而女子之智適足以為邦國之害也。 所出：《詩經 …" />
