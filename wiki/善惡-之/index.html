    <meta property="og:description" content="為惡者畏人識，必有識者；為善者欲人知，必有不知者。是故人不識者，謂之大惡；人不知者，謂之至善。好行惠者恩不廣，務奇特者功不大，善博奕者智不遠，文綺麗者名不久。是以君子惟道是貴，惟德自守，所以能萬世不朽。 所出：《化書 · 卷四》 — https://zh.wikisource.org/wiki/化書…" />
