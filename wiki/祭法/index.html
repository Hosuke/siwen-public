    <meta property="og:description" content="祭法者，聖王因時定制，祀有功烈於民者也。其義有四：一曰法施於民則祀之，二曰以死勤事則祀之，三曰以勞定國則祀之，四曰能禦大菑、捍大患則祀之。凡此五者，皆功烈於民，而不入祀典者無之。 所出：《禮記 · 祭法》 — https://zh.wikisource.org/wiki/禮記/祭法" />
