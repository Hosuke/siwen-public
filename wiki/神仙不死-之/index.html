    <meta property="og:description" content="抱朴子於此卷力證仙道之實，其要義有四： 一、聖人不必仙，仙人不必聖，治世與修真各有所務。 二、黃帝先治世而後登仙，是偶有兼才者。 三、仙者稟受星宿之精，非人力可強致。 四、仲尼知靈寶之方，是聖人非不知仙道，乃密脩而不輕示。 合是四者，可知神仙不死之說，非虛妄也。 所出：《抱朴子 · 卷12》 — h…" />
