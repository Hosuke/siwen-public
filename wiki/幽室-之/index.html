    <meta property="og:description" content="「幽室內明照陽門」，幽室非止為藏秘之象，亦炁液化為神光、返照內景之義。幽者，隱也，密也；明者，光也，昭也。密戶藏精，幽室納神，精充則神亮，神全則密戶幽室皆明，而陽門亦以光照人焉。一身之內，藏者愈密而明者愈照，《上清黃庭內景經》此句所以終上章之意，明脩真者內觀之極功也。 所出：《黃庭內景經 · 上有章…" />
