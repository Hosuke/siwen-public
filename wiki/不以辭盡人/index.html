    <meta property="og:description" content="「不以辭盡人」見於《禮記·表記》，論君子觀人之法。孔子曰：「君子不以辭盡人。故天下有道，則行有枝葉；天下無道，則辭有枝葉。」 此言大意：君子觀人，不以其言論為定準。何也？蓋辭有枝葉者，言過其實之謂也。天下有道之時，則踐行自有文飾，枝葉敷榮，無害於根本。天下無道之時，則人心不古，但以言詞相高，言語浮華…" />
