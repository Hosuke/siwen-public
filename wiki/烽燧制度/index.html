    <meta property="og:description" content="《墨子·雜守》篇所載烽燧之法，較他篇為詳。其文曰： &gt; 寇烽、驚烽、亂烽，傳火以次應之，至主國止。 是分烽為三等：寇烽、驚烽、亂烽。敵至則傳火以聞，次第達於主國。 又有晝夜之別，制度井然： &gt; 望見寇，舉一烽；入境，舉二烽；射妻，舉三烽、一鼓；郭會，舉四烽、二鼓；城會，舉五烽、五鼓。夜以火，如此數。…" />
