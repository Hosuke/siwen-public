    <meta property="og:description" content="非樂者，墨子學說中之重要命題也。墨子認爲，音樂之類享樂，雖能悅人耳目口腹，終無益於天下之利，反使萬民受損，故當禁絕之。 墨子之言非樂，非以其聲不美也。彼明言：「非以大鍾、鳴鼓、琴瑟、竽笙之聲以爲不樂也，非以刻鏤華文章之色以爲不美也，非以犓豕、煎炙之味以爲不甘也，非以高臺、厚榭、邃野之居以爲不安也。」…" />
