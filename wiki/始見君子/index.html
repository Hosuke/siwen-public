    <meta property="og:description" content="《禮記·少儀》詳定初見尊長之禮儀程序。初次求見君子，當稱「某固愿聞名於將命者」，表達卑微之願，望己之名得達於傳命之人。辭令之中，不可擅自攀附主題，是謂「不得階主」。與敵體之人相見，則稱「某固愿見」。罕見之人，云「聞名」；亟見之人，云「朝夕」。瞽者自稱「聞名」。適有喪事者，云「比」。童子則稱「聽事」。…" />
