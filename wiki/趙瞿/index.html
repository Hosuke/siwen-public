    <meta property="og:description" content="趙瞿，上黨人。病癩歷年，垂死，仙人經穴見之，以一囊葯賜之，戒服松脂。瘡愈，仙人復過，教服松脂，長服之，身輕百倍，年百七十歲，齒不墮，髮不白。夜臥，見臺間光如鏡，又常見面上綵女二人，遊戲口鼻之間，漸長大。居人間三百許年，色如小童。入抱犢山去。 所出：《神仙傳 · 卷七》 — https://zh.wi…" />
