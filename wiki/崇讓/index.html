    <meta property="og:description" content="洪祖浦廬以弟文功不得論，乃自表轉封其弟。朝廷欲成君高義，故特聽焉。文受爵即第，又分割租秩以供奉吏士。文累使奉迎驃騎，驃騎終不還。又令人守護博望宅舍，以冀驃騎之反，至於累世無居之者。洪祖父子兄弟之間，崇讓推功，世所稀有。 所出：《抱朴子 · 卷52》 — https://zh.wikisource.o…" />
