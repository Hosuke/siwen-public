    <meta property="og:description" content="又「上九无妄，行有眚，无攸利」，言上九以陽居无妄之極，時已過而不知止，猶欲行焉，則天命不佑，災眚及之矣。《象》曰「无妄之行，窮之災也」，時道既終，強行者必遭其困。此聖人所以戒夫知進退存亡而不失其正者也。 所出：《周易 · 无妄》 — https://zh.wikisource.org/wiki/周易…" />
