    <meta property="og:description" content="「名可強立，功可強成」見於文子卷二之末，乃文子本人之言，非老子所述。此說與文子全書之道家色彩略有不同，而別具一義。 文子引南榮疇之事跡以為例證： 「昔南榮疇恥聖道而獨亡於己，南見老子，受教一言，精神曉靈，屯閔脩達，勤苦十日不食，如享太牢，是以明照海內，名立後世，智略天地，察分秋毫，稱譽華語，至今不休…" />
