    <meta property="og:description" content="愛民不疾，乃墨子論執政者治民之道的教誨，強調上位者愛民當出於至誠而又急速，切不可延緩怠慢，務使民信之而後可以共圖治理。 篇末云：「凡使民尚同者，愛民不疾，民無可使。」此言欲使民行尚同之道，則執政者必先以愛民為急務。若愛民不誠不速，則民不見信，亦不肯為上所用，尚同之政無由而成也。 墨子具體陳說治民之法…" />
