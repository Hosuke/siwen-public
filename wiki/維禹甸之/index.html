    <meta property="og:title" content="維禹甸之" />
    <meta property="og:description" content="信彼南山，維禹甸之。 甸，治也。言終南之山，其地皆大禹所墾治以為田者也。維禹甸之之義，非止水土之平，乃兼疆理以授民耕之事。是詩以此發端，示農事之本在禹功，而曾孫率由以有秋也。君子思古，必本於禹之德，其垂法於後嗣者深矣。 所出：《詩經 · 信南山》 — https://zh.wikisource.or…" />
