    <meta property="og:description" content="林靈蘁表乞骸骨還山，不允。又以彗星、太乙離宮，不脩德不遷都。京師水災，先生奏天意戒帝，請太子四拜，水退一丈，夜退盡。京師人言太子之德。先生笑而不言。歸山前一日，謂如晦曰：吾法以付汝，尚有六印九符並六丁妙用神機，盡付汝傳一人。又以七寶素珠一串，囑曰如主上取之即付。靖康初，淵聖使人監郡守伐墓，大雨霹靂，…" />
