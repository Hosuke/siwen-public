    <meta property="og:description" content="有臣沮頌、蒼頡觀烏跡以作文字，此文字之始也。先儒論文字之始不同，或始於三皇，或始於伏羲，或雲與天地並興。今據司馬遷、班固、韋延、矢秉、付玄等雲：蒼頡，黃帝臣。蒼頡觀烏跡以作書契，蓋取諸夾。夾，庾也，次斷萬事。 帝既得龍鳳之圖書，蒼頡之文，即制文字以代結繩之政，以作書契。 所出：《歷世真仙體道通鑑 ·…" />
