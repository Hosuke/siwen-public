    <meta property="og:description" content="故，墨子哲學之基本邏輯範疇也。《墨子·經上》云：「故，所得而後成也。」言事物之成因，蓋有所得，而後乃成其果也。 此範疇為墨家論理學之根基。墨家以為，欲明一事之理，必先求其故。知其故，則可以預見其果，可以施為，可以立論。《墨經》又別因果為多端：有故、有所以成名之故、有為之故。夫知其故而行之，則功可成焉…" />
