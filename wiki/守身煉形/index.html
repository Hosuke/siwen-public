    <meta property="og:description" content="守身煉形術，道家內丹功法，以人身為鼎器，煉精氣神而為仙丹。抱朴子稱此為先師口訣，以韻文隱語傳授，不可輕泄。 其文曰：「始青之下月與日，兩半同昇合成一。出彼玉池入金室，大如彈丸黃如橘，中有嘉味甘如蜜，子能得之謹勿失。既往不追身將滅，純白之氣至微密，昇於幽關三曲折，中丹煌煌獨無匹，立之命門形不卒，淵乎妙…" />
