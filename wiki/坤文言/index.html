    <meta property="og:description" content="「坤文言」者，十翼之一，專釋坤卦之義。 坤文言首段曰：「坤至柔而動也剛，至靜而德方。後得主而有常，含萬物而化光。坤道其順乎！承天而時行。」 此總釋坤德之要：坤至柔而動則剛，至靜而德則方。地道无成而代有終，此坤之常也。 其下分釋六爻，皆聖人之微言，後世修身、處世之要道也。 所出：《周易 · 坤》 — …" />
