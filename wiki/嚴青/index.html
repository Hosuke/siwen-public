    <meta property="og:description" content="嚴青，會稽人，家貧，常在山中燒炭。忽遇仙人云：「汝骨相合仙。」以一卷素書與之，令以凈器盛之置高處，兼教青服石腦法。遂以凈器盛書，置高處，便聞左右常有十數人侍之。每載炭出，此神便為引船，他人但見船自行。斷谷入小霍山去。 所出：《神仙傳 · 卷七》 — https://zh.wikisource.org…" />
