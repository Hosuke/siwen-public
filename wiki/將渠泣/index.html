    <meta property="og:description" content="燕王喜使栗腹約歡趙，反欲伐之。將渠諫曰：「與人通關約交，以五百金飲人之王，使者報而反攻之，不祥，兵無成功。」燕王不聽。將渠引燕王綬止之，蹵之以足。將渠泣曰：「臣非以自為，為王也！」 所出：《史記 · 卷034》 — https://zh.wikisource.org/wiki/史記/卷034" />
