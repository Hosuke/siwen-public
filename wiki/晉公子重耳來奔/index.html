    <meta property="og:description" content="晉公子重耳出亡，過於曹，曹君袒裼而觀之。釐負羈與叔瞻侍於前。叔瞻謂曹君曰：「臣觀晉公子，非常人也。君遇之無禮，彼若有時反國而起兵，即恐為曹傷。君不如殺之。」曹君弗聽。釐負羈歸而不樂，其妻問之，負羈曰：「今日吾君召晉公子，其遇之無禮。我與在前，吾是以不樂。」其妻曰：「子奚不先自貳焉。」負羈曰：「諾。」…" />
