    <meta property="og:description" content="秦繆公立九年，齊桓公既霸，會諸侯於葵丘，而欲封禪。管仲睹桓公不可窮以辭，因設之以事，曰：「古之封禪，鄗上之黍，北里之禾，所以為盛；江淮之閒，一茅三脊，所以為藉也。東海致比目之魚，西海致比翼之鳥，然後物有不召而自至者十有五焉。今鳳皇麒麟不來，嘉穀不生，而蓬蒿藜莠茂，鴟梟數至，而欲封禪，毋乃不可乎？」於…" />
