    <meta property="og:description" content="又見於《詩經·葛屨》：「要之襋之，好人服之。」 「要」同「腰」，「襋」同「棘」，皆指衣領而言。言彼女為好人縫裳，既成則為之整理衣領、腰帶，以奉富人穿著。此語以操作之事卑微、富人享用之不以其道，而刺魏俗之不公也。 所出：《詩經 · 葛屨》 — https://zh.wikisource.org/wik…" />
