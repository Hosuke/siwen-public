    <meta property="og:description" content="紂爲象箸而箕子怖，以爲象箸必不盛羹於土鉶，則必犀玉之杯；玉柸象箸必不盛菽藿，則必旄象豹胎；旄象豹胎必不衣短褐而舍茅茨之下，則必錦衣九重、高臺廣室。稱此以求，則天下不足矣。聖人見微以知萌，見端以知末，故見象箸而怖，知天下之不足也。 所出：《韓非子 · 說林上》 — https://zh.wikisou…" />
