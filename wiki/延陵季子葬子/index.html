    <meta property="og:description" content="延陵季子葬子之事，見於《禮記·檀弓下》，為儒家論述喪禮之典範。 季札，吳王壽夢之少子，以賢名聞諸侯。嘗使齊，於其反也，長子死，遂葬於贏博之間。孔子聞而往觀其葬。 其葬之詳： - 壙坎之深，不至於泉——示亡者不受地濕之侵，亦寓魂魄安寧之意。 - 斂以時服——以季札平日之衣斂之，示不忘本色，亦寓生死如一…" />
