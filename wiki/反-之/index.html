    <meta property="og:description" content="帛書本《老子》：「玄德深矣遠矣與物反矣乃至大順。」 通行本作「與物反焉」，帛書本多一「矣」字，文義乃完。萬物皆逐外馳，聖人反諸本原；萬物皆貴智巧，聖人全於拙愚。反是道之樞機，順是德之極致。返則復命，順則大通。 所出：《老子 (帛書本) · 章六十五》 — https://zh.wikisource.…" />
