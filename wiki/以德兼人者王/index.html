    <meta property="og:description" content="《荀子·議兵篇》復云：「兼并易能也，唯堅凝之難焉。」能並之而不能凝，則必奪。不能並之又不能凝其有，則必亡。能凝之則必能並之矣。得之則凝，兼并無強。故凝士以禮，凝民以政；禮脩而士服，政平而民安；夫是之謂大凝。以守則固，以征則強，令行禁止，王者之事畢矣。 所出：《荀子 · 議兵篇》 — https://…" />
