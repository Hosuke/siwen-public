    <meta property="og:description" content="太史公論東越之亡曰：「越雖蠻夷，其先豈嘗有大功德於民哉？何其久也！歷數代常為君王，句踐一稱伯。然馀善至大逆，滅國遷眾，其先苗裔繇王居股等猶尚封為萬戶侯，由此知越世世為公侯矣。蓋禹之餘烈也。」 所出：《史記 · 卷114》 — https://zh.wikisource.org/wiki/史記/卷11…" />
