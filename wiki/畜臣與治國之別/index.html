    <meta property="og:description" content="畜臣與治國之別，墨子揭示之悖論。尚賢下篇云：今天下之士君子，居處言語皆尚賢，逮至其臨衆發政而治民，莫知尚賢而使能。 墨子舉例明之：王公大人有牛羊之財，不能殺，必索良宰；有衣裳之財，不能制，必索良工；有罷馬不能治，必索良醫；有危弓不能張，必索良工。雖有骨肉之親、無故富貴、面目美好者，實知其不能，不使之…" />
