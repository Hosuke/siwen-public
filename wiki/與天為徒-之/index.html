    <meta property="og:description" content="又仲尼語顏回曰：「然則我內直而外曲，成而上比。內直者，與天爲徒。與天爲徒者，知天子之與己皆天之所子，而獨以己言蘄乎而人善之，蘄乎而人不善之邪？若然者，人謂之童子，是之謂與天爲徒。」 所出：《莊子 · 人間世》 — https://zh.wikisource.org/wiki/莊子/人間世" />
