    <meta property="og:description" content="《禮記·祭義》記曾子之言，論孝道之層次，云：「曾子曰：『孝有三：大孝尊親，其次弗辱，其下能養。』」 曾子所述孝之三等，次第分明： 大孝尊親者，最高之孝行，謂使父母受人尊敬也。《孝經》云：「立身行道，揚名於後世，以顯父母。」斯之謂與？蓋孝子修身立德，惠施於人，使父母之名譽光耀，子孫共仰，此孝之極致也。…" />
