    <meta property="og:description" content="《管子》論形勢器械：「形勢器械未具，猶之不治也。形勢器械具，四者備，治矣。」器械乃治世之具，必與形勢相須，缺一不可。又論制器無敵：「存乎制器而器無敵。」成器必課必試，乃可言用；不試不臧，亦不可用也。 所出：《管子 · 七法》 — https://zh.wikisource.org/wiki/管子/七…" />
