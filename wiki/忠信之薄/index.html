    <meta property="og:description" content="帛書云：「夫禮者忠信之泊也，而亂之首也。」泊，薄也。禮之興，非厚德之所致，乃忠信既薄之後不得已而立之名器。以禮治世，是執薄而求厚，適足以召爭亂。末世以禮繩人，人不勝其擾，故禮愈密而爭愈起，亂之首也。典籍「泊」字多訓為「薄」，此一章義旨尤明。 所出：《老子 (帛書校勘版) · 第一章 論德》 — ht…" />
