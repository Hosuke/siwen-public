    <meta property="og:description" content="「昔我往矣，楊柳依依；今我來思，雨雪霏霏。行道遲遲，載渴載飢」，采薇卒章所述也。行者久戍得歸，然歸途漫漫，飢渴交迫，其艱不減出征。《詩》以遲遲狀歸途之緩，以莫知我哀見心事之無告，怨而不怒，哀而不傷，温柔敦厚之義備焉。後世羈旅之作，多祖此意。 所出：《詩經 · 采薇》 — https://zh.wik…" />
