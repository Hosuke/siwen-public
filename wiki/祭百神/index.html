    <meta property="og:description" content="百神者，天地間種種神祇之總稱也。《禮記·祭法》明言祭祀百神之主體與範圍。 祭祀百神，乃天下共主之責。《祭法》云：「有天下者，祭百神。」孔穎達疏曰：「百神，謂山淵、風雨、星辰、天地之屬。」此言奄有天下者，無問方內方外，凡百神靈，皆在祭典之中。 諸侯則不然。《祭法》云：「諸侯，在其地則祭之，亡其地則不祭…" />
