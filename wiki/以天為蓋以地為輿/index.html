    <meta property="og:description" content="以天為蓋，則無不覆也；以地為輿，則無不載也；四時為馬，則無不使也；陰陽為御，則無不備也。是故疾而不搖，遠而不勞，四支不動，聰明不損，而知八紘九野之形埒者，何也？執道要之柄，而游於無窮之地。大丈夫恬然無思，澹然無慮，以天為蓋，以地為輿，乘雲陵霄，與造化者俱。 所出：《淮南子 · 原道訓》 — http…" />
