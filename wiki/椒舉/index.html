    <meta property="og:description" content="蔡聲子論楚材晉用述椒舉之事：椒舉娶於申公子牟，子牟有罪而亡，康王以為椒舉遣之，椒舉奔鄭，將遂奔晉。蔡聲子遇之，勸以事晉，又與令尹子木論楚材晉用之弊。子木懼，使椒鳴召其父而復之。詳見蔡聲子論楚材晉用。 所出：《國語 · 卷17》 — https://zh.wikisource.org/wiki/國語/…" />
