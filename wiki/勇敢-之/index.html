    <meta property="og:description" content="勇敢之所以可貴，貴其能以立義；立義之所以可貴，貴其有行；有行之所以可貴，貴其行禮；行禮之所以可貴，貴其敢行禮義。勇敢強有力者，天下无事則用之於禮義，有事則用之於戰勝。用之於戰勝則無敵，用之於禮義則順治。 所出：《禮記 · 聘義》 — https://zh.wikisource.org/wiki/禮記…" />
