    <meta property="og:description" content="宣公後有嬖姬生子款，欲立之，乃殺其太子御寇。御寇素愛厲公子完，完懼禍及己，乃奔齊。齊桓公欲使陳完為卿，完曰：「羈旅之臣，幸得免負檐，君之惠也，不敢當高位。」桓公使為工正。齊懿仲欲妻陳敬仲，卜之，占曰：「是謂鳳皇于飛，和鳴鏘鏘。有媯之後，將育于姜。五世其昌，并于正卿。八世之後，莫之與京。」 所出：《史…" />
