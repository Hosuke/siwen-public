    <meta property="og:description" content="「上有魂靈下關元」之義，丹田居下以承上元之魂靈也。魂魄上交於泥丸，炁液下凝於丹田，二者往還不息，而人道全。經又云「灌溉五華植靈根，七液洞流衝盧間，迴紫抱黃入丹田」，言紫煙三素下歸丹田，與上浮之魂靈相抱，而成內景之全象。是故丹田者，上下一氣之交所，脩真之終基也。 所出：《黃庭內景經 · 上有章第二》 …" />
