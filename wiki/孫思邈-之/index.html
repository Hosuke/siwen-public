    <meta property="og:description" content="臣道一曰：孫思邈煉氣養神，精究醫藥，務行陰德，常蘊仁慈，汲汲以善為務。小蛇之傷，昆蟲之微爾，思邈以藥封而放之，其德及昆蟲，非人可及，至於龍宮之報，感靈異之若此。《道德經》曰：常善救物，故無棄物。孫思邈以之。 所出：《歷世真仙體道通鑑 · 29》 — https://zh.wikisource.org…" />
