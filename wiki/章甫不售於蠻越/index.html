    <meta property="og:description" content="抱朴子云：「章甫不售於蠻越，赤舄不用於跣夷，何可強哉？」章甫者，儒者祭冠之名；赤舄者，天子諸侯之履。蠻越之人跣足無履，章甫無所用之。抱朴子借此以喻：道意遠而難識，達之者寡，雖有至道，弗能強俗人使信之也。 又云：「彼誠以天下之必無仙，而我獨以實有而與之諍，諍之彌久，而彼執之彌固，是虛長此紛紜，而無救於…" />
