    <meta property="og:title" content="往而復反" />
    <meta property="og:description" content="求之近者，往而復反。迫則能應，感則能動，物穆無窮，變無形像。優游委縱，如響之與影；登高臨下，無失所秉；履危行險，無忘玄伏。能存之此，其德不虧，萬物紛糅，與之轉化，以聽天下，若背風而馳，是謂至德。 所出：《淮南子 · 原道訓》 — https://zh.wikisource.org/wiki/淮南子/…" />
