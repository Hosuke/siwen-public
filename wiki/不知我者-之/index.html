    <meta property="og:description" content="詩云「知我者，謂我心憂，不知我者，謂我何求」。知我者，則洞悉詩人閔宗周、傷故國之志；不知我者，但見其行邁靡靡、徘徊不去，以為必有所圖、有所私求。世人以世俗之心揣度，故不知其本心也。 所出：《詩經 · 黍離》 — https://zh.wikisource.org/wiki/詩經/黍離" />
