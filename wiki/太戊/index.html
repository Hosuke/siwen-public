    <meta property="og:description" content="帝太戊立伊陟為相。亳有祥，桑穀共生於朝，一暮大拱。帝太戊懼，問伊陟。伊陟曰：「臣聞妖不勝德，帝之政其有闕與？帝其修德。」太戊從之，而祥桑枯死而去。 伊陟贊言于巫咸。巫咸治王家有成，作咸艾，作太戊。帝太戊贊伊陟于廟，言弗臣，伊陟讓，作原命。殷復興，諸侯歸之，故稱中宗。 所出：《史記 · 卷003》 —…" />
