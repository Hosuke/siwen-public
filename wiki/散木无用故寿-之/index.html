    <meta property="og:description" content="匠石見櫟社樹，曰：「是不材之木也，無所可用，故能若是之壽。」櫟社托夢自辯曰：「且予求無所可用久矣，幾死，乃今得之，爲予大用。使予也而有，用且得有此大也邪？」匠石悟曰：「彼亦直寄焉，以爲不知己者詬厲也。不爲社者，且幾有翦乎！且也彼其所保與衆異，而以義譽之，不亦遠乎！」 所出：《莊子 · 人間世》 — …" />
