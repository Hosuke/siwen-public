    <meta property="og:description" content="蔡聲子論楚材晉用述王孫啟之事：昔令尹子元之難，或譖王孫啟於成王，王弗是，王孫啟奔晉，晉人用之。及城濮之役，王孫啟與於軍事，謂先軫以楚師必敗之故，先軫從之，大敗楚師。詳見蔡聲子論楚材晉用。 所出：《國語 · 卷17》 — https://zh.wikisource.org/wiki/國語/卷17" />
