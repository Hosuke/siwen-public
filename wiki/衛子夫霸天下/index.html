    <meta property="og:description" content="是時平陽主寡居，當用列侯尚主。主與左右議長安中列侯可為夫者，皆言大將軍可。主笑曰：「此出吾家，常使令騎從我出入耳，柰何用為夫乎？」左右侍御者曰：「今大將軍姊為皇后，三子為侯，富貴振動天下，主何以易之乎？」於是主乃許之。言之皇后，令白之武帝，乃詔衛將軍尚平陽公主焉。 天下歌之曰：「生男無喜，生女無怒，…" />
