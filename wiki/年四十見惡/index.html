    <meta property="og:description" content="孔子又曰：「年四十而見惡焉，其終也已。」 年四十而不善益彰，人所共惡，則終不可改矣。四十而不惑之年，而猶為善人所厭棄，是終於不仁也。聖人此言，深戒夫少小不脩而老大無成者，使人防微杜漸於早也。 所出：《論語 · 陽貨第十七》 — https://zh.wikisource.org/wiki/論語/陽貨…" />
