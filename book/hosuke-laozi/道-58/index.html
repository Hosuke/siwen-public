    <meta property="og:description" content="杳眇曰： 夫道之為物，視聽所不及，搏捪所不得，老子不得已而三名以命之，曰微、曰希、曰夷。視之而弗見聽之而弗聞，言道超乎形名之外，非耳目之私所能測也。《淮南子》嘗引無始之語曰：「道不可聞，聞而非也；道不可見，見而非也；道不可言，言而非也。」正此之謂。 帛書「捪之而弗得」，王弼本作「搏之不得」，二義皆通…" />
