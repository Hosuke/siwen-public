    <meta property="og:description" content="杳眇曰： 道之為物，生天生地，萬物所從出也。「天下有始，以為天下母」——始者本之時，母者本之親，明道為萬物之本源，萬物稟道而生，循道而終，此之謂也。 「既得亓母，以知亓子；既知亓子，復守亓母，沒身不殆」——此言知本守本之道也。得母即知子，然得子不可忘母；知子而不守母，則逐末忘本；守母而不知子，則孤存…" />
