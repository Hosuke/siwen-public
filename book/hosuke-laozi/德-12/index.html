    <meta property="og:description" content="杳眇曰： 「聖人恆無心，以百姓之心為心」——此一章之綱領，亦老子政治哲學之極則。 夫「恆無心」者，非痴愚之無心，乃虛己以應物之無心也。虛己故無私意，無私意故無偏情，無偏情故天下之心自赴之，此聖人所以為聖也。王弼注云「聖人之心，虛無恬淡，無有固必」，得之矣。然帛書作「恆無心」，王弼作「無常心」——語序…" />
