    <meta property="og:description" content="杳眇曰： 帛書之首章，老子之自題也。世人讀道德經皆從王弼本，以「道可道」為首；然帛書甲乙皆德先道後——此非寫者之失，乃老子之意。蓋道者太虛之名，德者落實之跡。不從跡入，則太虛无從契焉。故老子自德啟，以「上德不德」四字當頭棒喝。 德者得也，道之散而稟於人者爾。上德者，道全德備，无心於德，故曰「不德」—…" />
