    <meta property="og:description" content="杳眇曰： 道經此章，論治世之要，其要在絕上之所尚，還斯民於渾噩。民之初，無知無欲，湛然純樸，與道為一。及其後也，上有好者，下必甚焉。尚賢則民爭，貴貨則民盜，見欲則民心搖。三者既熾，天下纷然矣。 是以聖人之治，先絕其源。心者欲之府，虛之則嗜欲不入；腹者生之本，實之則飢寒不迫；志者求之未也，弱之則不貪；…" />
