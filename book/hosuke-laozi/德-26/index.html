    <meta property="og:description" content="杳眇曰： 「為无為，事无事，味无味」——六字三對，無為之要盡於此。夫為無為者，非不為也，不以有為之心為之；事无事者，非不事也，不以有事之心事之；味无味者，非無味也，於无味處得至味。三句一理：以無為之心行有為之事，此老子無為之真義，異乎世俗之以不事事為無為者矣。《莊子·應帝王》曰「順物之自然而因任之」…" />
