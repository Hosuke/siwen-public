    <meta property="og:description" content="杳眇曰： 夫道之在天下，猶川谷之於江海，漠然無形，而萬物資之以生。斯章之要，在明道與名之別、有與無之分、觀妙觀徼之旨；而其義之深淺，又於帛書、王弼之異文見之矣。 道可道非恆道，能道者非永恆不易之道；名可名非恆名，能名者非永恆不易之名。此，老子自警也——五千言所用之名，亦皆非恆名，讀者勿執我言為道。斯…" />
