    <meta property="og:description" content="杳眇曰： 此章以生死之象明柔弱之道，文簡而義深，於帛書王弼互校之中，其別煥然可睹。 夫「亓死也恆仞堅強」，王弼本但作「堅強」而已。「仞」者，立也，形容死者筋骨仞立僵固之貌；「恆」者，久常之謂，筋骨既仞，久而不化。此物理之實也，王弼刪而略之，辭簡而象隱矣。又「木強則恆」，王弼作「木強則兵」，文義晦澀。…" />
