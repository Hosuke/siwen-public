    <meta property="og:description" content="杳眇曰： 道也者，萬物之所以然，理之所以稽者也。然道生物而不自有其功，是之謂玄德。 今校此章，帛書云「道生之而德畜之，物形之而器成之」，王弼本「器」作「勢」。器者物之體，勢者物之力；帛書重形質，王弼重運會，二者俱通，而「器」字尤與「物形之」前序相承。帛書「道之尊也，德之貴也，夫莫之爵也，而恆自然也」…" />
