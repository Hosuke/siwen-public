    <meta property="og:description" content="杳眇曰： 大道廢有仁義，此章之樞要也。大道之世，渾沌完而名字不起；及其去道日遠，澆淳散樸，仁義之說乃生，孝慈之名乃立，忠臣之節乃見。失道而後德之序言之：道在則德全，德全則仁義不立；及其道失而德喪，然後仁義之名赫然見於天下。是故有仁義，正以無大道也；有孝慈，正以六親之不和也；有忠臣，正以邦家之昏亂也。…" />
