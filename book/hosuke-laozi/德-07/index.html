    <meta property="og:description" content="杳眇曰： 此章者，老子教人權量輕重之旨也。河上公注云「教人權量輕重，勿以浮名虛譽加之於身」，得其旨矣。三問相承，次第深入：名與身孰親，取精神之別，身非可以名換也；身與貨孰多，取內外之別，物非可以身易也；得與亡孰病，取存亡之別，終歸一問——得名而喪身，得乎亡乎？多藏而早逝，得乎亡乎？世人眩於名位，惑於…" />
