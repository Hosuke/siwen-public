    <meta property="og:description" content="杳眇曰： 嗇之為德，微妙而用弘。河上公注云「嗇，愛也」，言治人者愛民如子，事天者法道之自然，二者皆以嗇為本。然嗇非吝嗇之謂，乃斂藏之義，愛其精神、嗇其智識之術也。嗇者藏之於內，節者省之於外；外之節有時而窮，內之嗇無時而盡。此二義之辨，不可不明。 帛書云「蚤服」，王弼本作「早服」。杳眇竊謂：蚤者跳也，…" />
