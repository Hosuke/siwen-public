    <meta property="og:description" content="杳眇曰： 夫兵者不祥之器，天地之至逆也。老子本章，明聖人不得已而用兵之旨，要在以哀敬處之，非以武功矜也。 帛書首句作「夫兵者不祥之器也」，王弼本乃作「夫佳兵者」，多一「佳」字。夫「佳兵」者，美化兵器之謂也；去「佳」存「兵」，則兵之不祥愈見，河上公注云「兵者凶器，戰者危事，聖人不得已而用之」，正此意也…" />
