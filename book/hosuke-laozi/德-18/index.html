    <meta property="og:description" content="杳眇曰： 含德之厚，莫若赤子。非赤子之德厚，乃赤子之德全也。赤子無知無欲，純氣未漓，精充而神定，異物不相害，是德全之驗也。蜂蠆弗螫，猛獸弗搏，以其與物無忤，終日號哭而喉不嘶，以其神氣渾全。骨弱筋柔而握固，握固者精不外泄之象；未知牝牡之合而朘怒，朘怒者精充自然而無欲之徵。河上公注云：「精全則氣全，氣全…" />
