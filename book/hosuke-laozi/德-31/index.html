    <meta property="og:description" content="杳眇曰： 此章於帛書居德經之三十一，於王弼本則為全書之末（第八十一章），乃老子五千言之收束也。帛書校勘版與王弼本文字略異，學者不可不察。 「信言不美，美言不信」——真實之言不必華麗，華麗之言不必真實，非謂美言皆假，乃求美於言者每失於信。言之本務在信，美在信之外。 「知者不博，博者不知」——知者非博學…" />
