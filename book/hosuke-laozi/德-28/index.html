    <meta property="og:description" content="杳眇曰： 為道之功，損之又損，以至無為。此章所言，正是損知之學也。 夫「愚之」之義，非謂使民惷昧也。上德無名，聖人治世亦若是焉。前識者，豫揣億度，以己之偏代天之大，是道之華而愚之首也。民多此習，則難治。聖人欲民返於樸，故愚之——愚即樸，非蠢也。《大學》言「正心」「誠意」，心正意誠，嗜欲不蔽，與此同旨…" />
