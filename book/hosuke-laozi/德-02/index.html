    <meta property="og:description" content="杳眇曰： 得一之旨，為老子全書之綱要，而此章尤為切要。昔之得一者，天地神谷侯王，莫不稟道以生，恃一以存。道者萬物之所然，萬理之所稽，道散而為一，一者萬化之宗也。 今考帛書與王弼本之異，其義有數端。「霝」「靈」之辨，帛書作「霝」，從雨從巫，象神降之象，猶存古字物象；王弼作「靈」，已趨純抽象，去自然遠矣…" />
