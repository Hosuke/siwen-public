    <meta property="og:description" content="杳眇曰： 「知者弗言，言者弗知」——老子之自證，亦五千言之自注也。道以言得，亦以言失：得者得之言之外，失者失言之內。帛書「弗」字較王弼「不」字為峻——知者非僅不言，乃主動弗言；言者非僅不知，乃因言而蔽其知。此千古之惑，帛書一出而決矣。 塞兌閉門、和光同塵、挫銳解紛——六者非修道之六目，乃玄同之六象也…" />
