    <meta property="og:description" content="杳眇曰： 天下皆知美為美，惡已；皆知善訾不善——美之名一立，惡即隨之；善之稱一成，不善即起。蓋名既定，待體以成，反義自生於名立之時，非有美之外別有惡也。同理，有无、難易、長短、高下、音聲、先後——六對相待，相反以成，非二物之敵，乃一氣之流通爾。《易》曰「一陰一陽之謂道」，其斯之謂歟？ 帛書「先後之相…" />
