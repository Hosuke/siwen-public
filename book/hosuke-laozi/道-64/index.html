    <meta property="og:description" content="杳眇曰： 此章之要，在明道者之所以異於俗也。首言「唯與訶」「美與惡」，皆分別相也。河上公注云：「唯者，應之善；訶者，應之慢。」世人馳逐是非之場，於應對辭受之際，猶計較短長，此俗學之蔽也。帛書「人之所畏，亦不可以不畏人」，王弼本闕此文義。畏者，人之所同；能畏人者，道之所以通行也。關尹子云「道無人而聖人…" />
