    <meta property="og:description" content="杳眇曰： 執大象，天下往。大象者，道之全體也，無形無名，而萬物宗之。執大象天下往者，聖人抱一守樸，不以智巧擾民，不以刑名割物，天下之民自歸往而無害。夫道法自然而無為，樂與餌者，人欲之所悅也，有待而後止，過其欲則不能存，故樂與餌過格止——言欲之有竭也。聖人之治不恃賞勸以悅民心，而民自遂其性，此安平大之…" />
