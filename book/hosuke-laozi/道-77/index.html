    <meta property="og:description" content="杳眇曰： 此章六句，兩兩相對，以次遞進，示脩身之全功也。首言知人與自知，次言勝人與自勝，繼言知足與強行，終言守所與死道不亡，由內而外，由己而天，階梯分明，而要以自知自勝為本。 知人者智，自知者明——智與明異，智察於外，明照於內。河上公章句云：「知人者知也，察人之善惡賢愚；自知者明也，內視返聽，洞達心…" />
