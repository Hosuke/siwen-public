    <meta property="og:description" content="杳眇曰：天下之器，神而已矣。夫神器者自有其律，非智術所能把握，非有為所能馭致。帛書云「將欲取天下而為之，吾見亓弗得已」，較之王弼本「吾見其不得已」，義尤峻切。不得已者，勢有弗得不已，是被動之辭；弗得已者，明知其不可而強為之，是自敗之辭也。一字之間，輕重懸絕，讀者不可以不察。河上公曰「為者敗之，執者失…" />
