    <meta property="og:description" content="杳眇曰：道經此章，帛書與王弼本異文數端，於義各有淺深，不可不辨。 帛書作「上善治水」，王弼本作「上善若水」。治者，循物之性而導之，非拂其自然之謂。水之性篇言「水之性，行至曲必留退」，得其旨矣。若水者，徒取象言；治水者，兼實行言。上善若水之喻，自王弼本而流布天下，學者往往執象忘意，殊不知帛書之「治」字…" />
