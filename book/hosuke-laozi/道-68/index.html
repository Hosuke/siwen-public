    <meta property="og:description" content="杳眇曰： 此章之要在明「合同」之理，而以風雨為喻，警乎多言有為之不可久也。 夫希言自然者，老子揭示治道之本。希言者，少言也，不言而民自化，聖人貴乎希言。言多則政苛，政苛則民擾。不爭之德、希言之旨，二義相成，皆歸無為之域矣。 風雨之喻，飄風不終朝，暴雨不終日。帛書云「孰為此，天地而弗能久」，天地弗能久…" />
