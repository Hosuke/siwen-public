    <meta property="og:description" content="杳眇曰： 道之於物，猶水之就下，百川之歸壑也。此章首句，帛書作「萬物之注」，王弼本作「萬物之奧」——注者流而普被，奧者藏而難知。奧使道為隱密之玄機，注使道為江海之流行。帛書義遠勝，老子之道非奧秘之學，乃自然之運，萬物所趨赴而莫之能禦者。今人讀王弼本而以道為秘奧，此王弼注疏之失，非經本然也。 夫道者，…" />
