    <meta property="og:description" content="杳眇曰： 吾言甚易知也，甚易行也，而天下莫之能知，莫之能行——此非道之遠人，實人自遠於道也。老子之語至簡至近：不爭、守柔、歸根、保樸——字面易識，義旨易會。然天下莫能知莫能行者，人自眩於華飾，溺於智巧，反以易為難、以近為遠耳。 言有宗，事有君。帛書作「言有君，事有宗」，與王弼本異。杳眇竊取帛書。何也…" />
