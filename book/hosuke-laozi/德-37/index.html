    <meta property="og:description" content="杳眇曰： 德經三十七章，帛書題曰「畏畏」，義旨深切，乃治世者之至戒也。 今以帛書校王弼本，其異有三，茲辨其要。 其一，「民之不畏畏」，王弼本作「民不畏威」。畏畏者，敬畏其所當畏，指天道、義理之自然秩序；威者，威嚴、刑罰之外力也。帛書言民失其內在之敬畏，則大畏將至；王弼言民不畏刑威，則強威至。義之深淺…" />
