    <meta property="og:description" content="杳眇曰：極之一篇，關尹書九篇之樞也。考之全書，他篇多涉五行、數術、丹鼎之說，獨此篇不染其辭，於術語叢雜之中，挺然特出，質勁而旨純。此無他故——篇中「在己無居，形物自著，其動若水，其靜若鏡，其應若響……未嘗先人，而嘗隨人」一段，與《莊子·天下》所載關尹之言全同。天下篇曰「關尹老聃乎，古之博大真人哉」，…" />
