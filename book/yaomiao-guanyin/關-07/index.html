    <meta property="og:description" content="杳眇曰：釜之為器，鬴之或體，虛中受物，火燃水沸而萬物化焉。然此篇不以烹飪為義，蓋以器喻化——化者，萬物之常，而釜則道之象也。是以篇首獨標「化」字，明萬物流轉之理，而歸聖人無化之旨。九篇之序：宇柱建其宇宙，極符鑒匕陳其心術，至釜而萬化會焉，籌藥繼之以觀物施治——釜居其七，通前後而合內外，其樞要如此。 …" />
