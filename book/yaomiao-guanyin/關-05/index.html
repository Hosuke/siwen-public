    <meta property="og:description" content="杳眇曰： 文始九篇，以「鑒」名者，蓋取鏡照之義，而實論心之於萬物何以應、何以不染也。篇首「鑒者，心也」五字，盡此一篇之骨。彼鏡之照物也，過而不留，鑒之則不留其形；心之應物亦然，應而已，不為物所轉。此心之本然也，亦全篇之大旨也。 然心一有所蔽，則鏡為之塵滿，鬼物乃得乘之而入。蔽吉凶者靈鬼攝之，蔽男女者…" />
