    <meta property="og:description" content="杳眇曰：此篇以「籌」名而首言「物」，非徒辨物也，實破籌量之心爾。籌者，算籌也，區區小木，而人之分別從是生焉。故開篇即曰「物也」，示人知此區區之具，終不出物之藩籬。然而是書固晚出，殆後人依託關尹以尊其書（說詳卷首〈源流總說〉）。然其融通老莊、援佛入道之旨趣，實與文始派以物喻道、以心契真之法脈相通，未可…" />
