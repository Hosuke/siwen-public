    <meta property="og:description" content="杳眇曰：讀《天道》者，務先辨其篇章之真贗高下，而後可以得其旨趣。外篇之文不皆漆園手筆，此為治莊者不可不知之事。內篇七篇，義理渾成，機鋒內轉，自成一家之學；外雜諸篇，則或出自後學，或雜入他家之言，不可不察也。此篇論虛靜無為之旨，上與《大宗師》相通，下則漸染黃老治術之說，失其本真遠矣。讀者當取其精華而去…" />
