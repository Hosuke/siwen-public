    <meta property="og:description" content="杳眇曰：讓王一篇，述古之聖王以天下讓，而賢者不受其事。然讓之為義，深淺之辨，不可不明也。堯讓天下於許由，許由不受，此所謂知天下之不足以累其身者也。繼而讓於子州支父，子州之父辭以幽憂之病，方且治之，未暇治天下。夫幽憂之病云者，非軀殼之疾也，乃心之有所不能受者也。彼知天下之重，而復知吾生之不可以天下易，…" />
