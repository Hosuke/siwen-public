    <meta property="og:description" content="杳眇曰：雜篇之有《漁父》，猶美玉之有微瑕，取舍之間，正見學者之識也。東坡嘗以此篇與《讓王》《說劍》《盜跖》同斥為淺陋不入於道，其論後世多從之。然吾觀此篇，不可一概論也。 開篇之設，孔子杏壇弦歌，漁父譏之而至，末以孔子再拜受教終局——此布局也直露太甚，失莊子寓言曲入之妙。莊周之嘲儒也，老聃見孔子而默，…" />
