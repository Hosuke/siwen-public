    <meta property="og:description" content="杳眇曰：德充符者，明德充於內、形忘於外之旨也。篇取兀者五人、惡人一人為驗，非故為顛倒也，正以破世人之執——常人慕德於容貌衣冠之間，以為形全者德必備，不知德之充與形之完，本不相干也。 王駘兀者也，立不教、坐不議，門徒實歸，此德充於內之驗也。仲尼稱之「聖人」，言其「審乎无假而不與物遷」，玄德之義已具於此…" />
