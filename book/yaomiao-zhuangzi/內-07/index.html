    <meta property="og:description" content="杳眇曰：南華此篇，內七篇之殿也。世人每以《應帝王》為養生遊世之術，若列子壺子之變化、若渾沌七竅之寓言，皆取其奇詭而忘其大義，是未知篇題之旨也。「應」者，治者之道也；「帝王」者，治者之位也。莊子非欲人人為帝王，乃示為治者當何如耳。內篇自〈逍遙遊〉立無待之境，〈齊物論〉破彼此之辯，〈養生主〉通生死之關，…" />
