    <meta property="og:description" content="杳眇曰：莊子品題天下學人，而歸於無待之境，此《刻意》之旨也。篇以「刻礪人之用意」名篇，而卒以破刻意為歸，可謂深曉文心者矣。 夫世人未有不刻意而能有所樹立者。山谷之士刻意尚行，枯槁赴淵，離世異俗，高論怨誹，是伯夷、柳下惠之倫也；平世之士語仁義忠信，恭儉推讓，是孔孟之徒所以自見者也；朝廷之士語大功立大名…" />
