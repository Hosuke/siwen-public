    <meta property="og:description" content="杳眇曰：秋水一篇，外篇之秀也。王夫之嘗謂「《齊物》齊之於心，《秋水》齊之於境」，斯言得之。內篇言道之體，秋水則言道之用；內篇渾沌，秋水波瀾。然波瀾之盛，要以渾沌為宗，讀者不可不察也。 篇首河伯望洋之喻，是莊子設局之妙。秋水時至，百川灌河，河伯欣然自喜，以天下之美盡在己——此俗人之常態也。及順流東行，…" />
