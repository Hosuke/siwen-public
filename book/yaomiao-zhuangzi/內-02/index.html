    <meta property="og:description" content="杳眇曰：齊物論三字，千載讀誤。俗解以為齊萬物，謂大小壽夭、美醜貴賤悉歸於一，此郭象之失，非莊子之本意也。王船山一語破之：「齊其論，非齊物。」所齊者，是非之論耳，非使諸物自齊也。萬竅怒呺而聲各異，使其自己咸其自取，物何嘗齊？所當齊者，人心分別是非之論耳。嗟乎，此一念之辨，正學者趨道之樞也。 篇首南郭子…" />
