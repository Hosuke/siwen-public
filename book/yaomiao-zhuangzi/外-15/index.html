    <meta property="og:description" content="杳眇曰：篇首設三訪之問，知北遊玄水、狐闋、帝宮之間，先問无為謂，无為謂不答；次問狂屈，狂屈欲言而忘；末問黃帝，黃帝對之洋洋，而自嘆「我與汝終不近」。由是觀之，真知在彼不在此，在不言在不答，在无思无慮之冥契，不在論說條析之紛紌。《大宗師》云「知天之所為，知人之所為者，至矣」，至人在无思无慮中觀道之大全…" />
