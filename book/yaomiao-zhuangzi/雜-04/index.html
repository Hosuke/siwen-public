    <meta property="og:description" content="杳眇曰：外物一篇，雜篇之秀也。篇首四字立其骨焉，曰「外物不可必」。龍逢誅而比干戮，箕子狂而惡來死，伍員流江而萇弘化碧——忠與孝、富與貴，皆求之於外而繋之於人者也。求之於外，則成敗利鈍不吾自主，此莊子所以歎也。然讀者苟執此以為莊子尚退讓、戒進取，則又失之遠矣。蓋外物之不可必，非使人絕物而隱也，乃明人之…" />
