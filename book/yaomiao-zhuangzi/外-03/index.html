    <meta property="og:description" content="杳眇曰：篇名「胠篋」者，開篋之義也。小盜竊物，大盜竊國，其揆一也。全篇之要，在破「聖知」之執。世人徒知防小盜而不知防大盜，不知聖知之法適足為大盜之資，此莊生之所以痛切言之者也。 夫世俗所謂知，不過攝緘縢、固扃鐍之術，守之愈嚴，盜之愈巧，是知乃大盜之資而非自全之道也。田成子殺齊君而盜其國，並取聖知之法…" />
