    <meta property="og:description" content="杳眇曰：說劍一篇，居南華雜篇之末，其體其辭，迥異內篇之旨。內篇若逍遙遊之無待，齊物論之齊是非，大宗師之坐忘同道，應帝王之無名而天下治，皆超然物表，逍遥自得，未嘗以帝王之術為務也。此篇則不然，假莊周之口，論天子諸侯庶人三劍之辨，其辭雄，其意切，其歸在治不在道，在匡諸侯而天下服，非南華真精神所寄明矣。 …" />
