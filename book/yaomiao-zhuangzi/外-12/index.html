    <meta property="og:description" content="杳眇曰：達生之篇，其要在乎破執以歸天，而歸天之途非一途也。篇首即示人以要：「達生之情者，不務生之所无以為；達命之情者，不務知之所无柰何。」生之所以无以為，命之所以无柰何，此非人力所能強者也。世之人以為養形足以存生，不知形不離而生亡者有之矣。欲免為形，莫如棄世；棄世則无累，无累則正平，正平則與彼更生。…" />
